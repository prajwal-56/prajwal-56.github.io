<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Blog by Prajwal Praveen — thoughts, writeups, and things I find interesting.">
  <title>blog — prajwal</title>
  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90' font-family='monospace' fill='%237a8f65'%3E%3E%3C/text%3E%3C/svg%3E">
</head>
<body>
  <div class="container">

    <nav class="fade-in">
      <ul>
        <li><a href="index.html">home</a></li>
        <li><a href="projects.html">projects</a></li>
        <li><a href="blogs.html" class="active">blog</a></li>
        <li><a href="contact.html">contact</a></li>
        <li><a href="socials.html">socials</a></li>
      </ul>
    </nav>

    <main>
      <h1 data-scramble>blog</h1>

      <p class="page-desc" data-typewriter="I have opinions. I just haven't written them down yet." data-typewriter-delay="500"></p>

      <!-- blog list container -->
      <div id="blog-list" class="fade-in" style="--delay: 1.2s">
        <p style="color: var(--text-muted); font-size: 0.85rem; font-weight: 300;">loading posts...</p>
      </div>
    </main>

    <footer class="fade-in" style="--delay: 1.5s"></footer>

  </div>

  <script src="footer.js"></script>
  <script src="animate.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const blogListContainer = document.getElementById('blog-list');

      fetch('blogs/index.json')
        .then(response => {
          if (!response.ok) throw new Error('Failed to load blog list');
          return response.json();
        })
        .then(posts => {
          if (!posts || posts.length === 0) {
            blogListContainer.innerHTML = '<p style="color: var(--text-muted); font-size: 0.85rem; font-weight: 300;">no posts yet. check back later, or don\'t. I\'ll probably forget to update this anyway.</p>';
            return;
          }

          let html = '';
          posts.forEach(post => {
            html += `
              <div class="project-item" style="margin-bottom: 2rem;">
                <a href="blog-post.html?post=${post.slug}" class="project-name">${post.title}</a>
                <span class="project-lang">${post.date}</span>
                <p class="project-desc">${post.description}</p>
              </div>
            `;
          });
          blogListContainer.innerHTML = html;
        })
        .catch(err => {
          console.error(err);
          blogListContainer.innerHTML = '<p style="color: var(--text-muted); font-size: 0.85rem; font-weight: 300;">failed to load posts. check back later, or don\'t.</p>';
        });
    });
  </script>
</body>
</html>
